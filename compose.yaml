services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_trade
      POSTGRES_USER: ai_trade
      POSTGRES_PASSWORD: ai_trade
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_trade -d ai_trade"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
